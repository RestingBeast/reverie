services:
  frontend:
    image: node:26
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "pnpm install && pnpm run dev"
    ports:
     - 3000:3000
    networks:
     - mynetwork
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
  backend:
    image: node:26
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pnpm install && pnpm run dev"
    networks:
     - mynetwork
networks:
  mynetwork:
    driver: bridge
